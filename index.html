<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<title>RENMATI.EXE</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: Arial, sans-serif;
  color: white;
}

/* CANVAS (fondo animado) */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

/* CONTENIDO */
.container {
  position: relative;
  text-align: center;
  margin-top: 100px;
}

.card {
  background: rgba(20, 20, 20, 0.8);
  padding: 25px;
  border-radius: 15px;
  display: inline-block;
  box-shadow: 0 0 25px rgba(0,255,100,0.2);
}

/* EFECTO HOVER */
.card:hover {
  transform: scale(1.05);
  transition: 0.3s;
}

/* TEXTO GLOW */
h1 {
  color: #00ff88;
  text-shadow: 0 0 10px #00ff88;
}

</style>

</head>

<body>

<canvas id="bg"></canvas>

<div class="container">
  <div class="card">
    <h1>☣️ RENMATI</h1>
    <p>🧟 Sobreviviente | 🎮 Gamer | 💻 Futuro Dev</p>

  </div>
</div>

<script>
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

// Crear partículas
for (let i = 0; i < 120; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    radius: Math.random() * 2,
    speedY: Math.random() * 1 + 0.2
  });
}

// Animación
function animate() {
  ctx.fillStyle = "rgba(0,0,0,0.2)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#00ff88";

  particles.forEach(p => {
    p.y += p.speedY;

    if (p.y > canvas.height) {
      p.y = 0;
      p.x = Math.random() * canvas.width;
    }

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
    ctx.fill();
  });

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
