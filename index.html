<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>RENMATI.EXE</title>

<style>
body {
  margin: 0;
  background: black;
  font-family: Arial, sans-serif;
  color: white;
  cursor: url('https://cur.cursors-4u.net/cursors/cur-2/cur116.cur'), auto;
  transition: 0.2s;
}

/* 🎮 HUD SUPERIOR */
.hud {
  position: fixed;
  top: 0;
  width: 100%;
  height: 35px;
  background: rgba(0,255,100,0.1);
  border-bottom: 1px solid #00ff88;
  display: flex;
  justify-content: space-between;
  padding: 5px 15px;
  font-size: 14px;
  z-index: 10;
}

/* 💻 PANEL HACKER */
.panel {
  position: fixed;
  top: 50px;
  left: 10px;
  background: rgba(0,0,0,0.8);
  border: 1px solid #00ff88;
  padding: 10px;
  font-size: 12px;
  z-index: 10;
}

/* 🎬 VIDEO */
.video-box {
  position: fixed;
  right: 15px;
  bottom: 15px;
  width: 240px;
  z-index: 5;
}

.video-box video {
  width: 100%;
  border-radius: 15px;
  box-shadow: 0 0 15px #00ff88;
}

/* 🔊 BARRA AUDIO */
#audioBar {
  position: fixed;
  left: 15px;
  bottom: 15px;
  width: 150px;
  height: 8px;
  background: rgba(0,255,100,0.2);
}

#audioLevel {
  height: 100%;
  width: 10%;
  background: #00ff88;
}

/* 🔥 FUEGO */
.fire {
  position: fixed;
  bottom: 0;
  width: 100%;
  height: 80px;
  background: linear-gradient(transparent, red, orange);
  opacity: 0.3;
}

/* PERFIL */
.profile {
  width: 170px;
  height: 170px;
  border-radius: 50%;
  margin-top: 60px;
  box-shadow: 0 0 25px #00ff88;
}

/* TARJETA */
.card {
  background: rgba(20,20,20,0.9);
  padding: 50px;
  border-radius: 25px;
  width: 520px;
  margin: auto;
  text-align: center;
  box-shadow: 0 0 40px rgba(0,255,100,0.25);
}

h1 {
  font-size: 75px;
  color: #00ff88;
}

.section {
  margin-top: 80px;
  text-align: center;
}

h2 {
  color: #00ff88;
}
</style>
</head>

<body>

<!-- 🎮 HUD -->
<div class="hud">
  <div>🟢 Sistema activo</div>
  <div id="time"></div>
</div>

<!-- 💻 PANEL -->
<div class="panel">
  STATUS: ONLINE<br>
  USER: RENMATI<br>
  MODE: SURVIVOR
</div>

<!-- 🎬 VIDEO -->
<div class="video-box">
  <video id="bgVideo" autoplay loop muted controls>
    <source src="Chubby Mosh - Emblazone Corpse.mp4" type="video/mp4">
  </video>
</div>

<!-- 🔊 AUDIO -->
<div id="audioBar"><div id="audioLevel"></div></div>

<!-- 🔥 FUEGO -->
<div class="fire"></div>

<!-- PERFIL -->
<div style="text-align:center;">
  <img src="-4otihf.jpg" class="profile">
</div>

<div class="card">
  <h1>RENMATI</h1>
  <p>🎮 Gamer | 💻 Programador en progreso</p>
</div>

<div class="section">
  <h2>🚀 Sobre mí</h2>
  <p>Soy un creador en crecimiento que busca convertirse en desarrollador profesional.</p>
</div>

<script>
// ⏰ HORA
setInterval(()=>{
  document.getElementById("time").innerText = new Date().toLocaleTimeString();
},1000);

// 🎵 AUDIO
let video = document.getElementById("bgVideo");
let bar = document.getElementById("audioLevel");

const ctx = new (window.AudioContext || window.webkitAudioContext)();
const src = ctx.createMediaElementSource(video);
const analyser = ctx.createAnalyser();

src.connect(analyser);
analyser.connect(ctx.destination);

const data = new Uint8Array(analyser.frequencyBinCount);

function react(){
  analyser.getByteFrequencyData(data);
  let avg = data.reduce((a,b)=>a+b)/data.length;

  video.style.transform = `scale(${1+avg/300})`;
  bar.style.width = avg+"%";

  // 🧟 modo oscuro dinámico
  document.body.style.background = `rgb(${avg/2},0,0)`;

  requestAnimationFrame(react);
}

document.addEventListener("click", ()=>{
  video.muted=false;
  ctx.resume();
  react();
},{once:true});
</script>

</body>
</html>
